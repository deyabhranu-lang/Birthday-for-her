<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

.container{
    text-align:center;
    color:white;
}

h1{
    font-size:55px;
    animation:fade 2s;
}

p{
    font-size:24px;
}

button{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:40px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}

@keyframes fade{
from{opacity:0;transform:translateY(-40px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h1>Happy Birthday ❤️</h1>

<p>To the most beautiful girl in my life</p>

<button onclick="showMessage()">Click Me 🎁</button>
</div>

<script>
function showMessage(){
alert("Happy Birthday, My Love! ❤️\n\nYou make every day brighter just by being in it. I hope your birthday is as wonderful as you are. Love you forever! 🎂🥰");
}
</script>

</body>
</html>
